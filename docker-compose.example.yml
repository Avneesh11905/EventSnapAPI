name: eventsnap
services:
  # 1. PostgreSQL Database with pgvector pre-installed
  postgres:
    image: ankane/pgvector:latest
    container_name: eventsnap_db
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventsnap_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      Eventsnap-Network:
        aliases:
          - postgres

  # 2. RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: eventsnap_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - ./data/rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      Eventsnap-Network:
        aliases:
          - rabbitmq

  # 3. GPU Inference API (Local testing of Hugging Face Endpoints)
  inference_api:
    build: ./inference_api
    ports:
      - "5000:5000"
    environment:
      - PYTHONPATH=/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - Eventsnap-Network

  # 4. Main API (The Orchestrator)
  main_api:
    build: ./main_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://username:password@postgres:5432/eventsnap_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - INFERENCE_API_URL=http://inference_api:5000
      - MINIO_ACCESS_KEY=
      - MINIO_SECRET_KEY=
      - MINIO_BUCKET_NAME=eventsnap
      - MINIO_ENDPOINT=http://minio:9000
      - API_KEY=supersecret_eventsnap_key_2026
      - PYTHONPATH=/app
    depends_on:
      - postgres
      - rabbitmq
      - inference_api
    restart: unless-stopped
    networks:
      - Eventsnap-Network

  # 5. Celery Worker (Background Processor)
  celery_worker:
    build: ./main_api
    command: celery -A infrastructure.queue.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://username:password@postgres:5432/eventsnap_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - INFERENCE_API_URL=http://inference_api:5000
      - MINIO_ACCESS_KEY=
      - MINIO_SECRET_KEY=
      - MINIO_BUCKET_NAME=eventsnap
      - MINIO_ENDPOINT=http://minio:9000
      - PYTHONPATH=/app
    depends_on:
      - postgres
      - rabbitmq
      - inference_api
    restart: unless-stopped
    networks:
      - Eventsnap-Network

networks:
  Eventsnap-Network:
    driver: bridge